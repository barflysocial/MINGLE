services:
  - type: web
    name: one-match-ai
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: HOST_PIN
        value: "2468"
      - key: RSVP_CODE
        value: "ONEMATCH"
      - key: CHECKIN_CODE
        value: "HOST77"
      - key: OPENAI_MODEL
        value: "gpt-5.5"
